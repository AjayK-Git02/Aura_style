name: aura_style
description: "A production-grade personalized fashion and virtual try-on application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase Backend
  supabase_flutter: ^2.6.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Routing
  go_router: ^14.6.2
  
  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0
  
  # UI Components
  cupertino_icons: ^1.0.8
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  google_fonts: ^8.0.0
  http: ^1.6.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  
  # Linting
  flutter_lints: ^5.0.0
  
  # Icons
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icons/app_logo.jpg"

flutter_native_splash:
  color: "#121212"
  image: "assets/icons/app_logo.jpg"
  android_12:
    color: "#121212"
    image: "assets/icons/app_logo.jpg"
  fullscreen: true

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
